name = "bible-editor-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Local dev binds to 8787 by default; the web app proxies /api/* to it.
[dev]
port = 8787

# Static-asset hosting for the SPA. After `npm --workspace web run build`,
# Vite emits web/dist; wrangler serves it for any path that isn't matched by
# a Worker route. `single-page-application` makes deep links (#/ZEC/3) work
# by falling back to index.html for unknown paths.
#
# In dev we keep the existing split (vite on 5173, wrangler on 8787 via vite
# proxy); this block only kicks in on `wrangler deploy`. wrangler dev tolerates
# a missing dist dir but will warn — run a build first to silence it.
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database — replace `database_id` once we run `wrangler d1 create bible_editor`.
[[d1_databases]]
binding = "DB"
database_name = "bible_editor"
database_id = "REPLACE_AFTER_wrangler_d1_create"
migrations_dir = "migrations"

# R2 bucket — for USFM originals and export snapshots. Create with `wrangler r2 bucket create bible-editor-blobs`.
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "bible-editor-blobs"

# Durable Object for per-chapter presence + fanout.
[[durable_objects.bindings]]
name = "CHAPTER_ROOM"
class_name = "ChapterRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChapterRoom"]

# Workflow for the nightly DCS export. Each (book × resource) is its own
# retryable step, so a flaky DCS commit doesn't take the whole run down.
[[workflows]]
name = "bible-editor-export"
binding = "EXPORT_WORKFLOW"
class_name = "ExportWorkflow"

# Nightly export to DCS at 06:00 UTC.
[triggers]
crons = ["0 6 * * *"]

# Public-safe defaults; secrets go in `wrangler secret put` (DCS_CLIENT_ID, DCS_CLIENT_SECRET, JWT_SIGNING_KEY, DCS_SERVICE_TOKEN, BT_API_TOKEN).
# ALLOWED_ORIGINS is comma-separated. Empty falls back to the dev allowlist
# inside src/index.ts (localhost:5173 / 8787 only). Set this to the deployed
# SPA origin once the worker leaves dev.
# DEV_AUTH_ENABLED gates the /api/auth/dev mint endpoint; must be unset in prod.
# DCS_EXPORT_OWNER / DCS_EXPORT_BRANCH control where nightly exports land on
# DCS. Defaults: unfoldingWord owner, "live-snapshot" branch. Override per env.
# BT_API_TOKEN (secret) authorizes /api/tn-quick → uw-bt-bot. Absence disables
# the route. TN_QUICK_URL overrides the bot URL (default below).
[vars]
DCS_BASE_URL = "https://git.door43.org"
DCS_OAUTH_AUTHORIZE_URL = "https://git.door43.org/login/oauth/authorize"
DCS_OAUTH_TOKEN_URL = "https://git.door43.org/login/oauth/access_token"
JWT_ISSUER = "bible-editor"
JWT_TTL_SECONDS = "1209600"
ALLOWED_ORIGINS = ""
DEV_AUTH_ENABLED = "true"
DCS_EXPORT_OWNER = "unfoldingWord"
DCS_EXPORT_BRANCH = "live-snapshot"
TN_QUICK_URL = "https://uw-bt-bot.fly.dev/api/tn-quick"
