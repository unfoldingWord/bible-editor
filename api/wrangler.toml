# Dev-suffixed on purpose: the production worker is `bible-editor-api` (set in
# [env.production] below). With a distinct top-level name, a plain
# `wrangler deploy` (missing `--env production`) lands on a separate dev worker
# instead of overwriting prod with dev bindings.
name = "bible-editor-api-dev"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Local dev binds to 8787 by default; the web app proxies /api/* to it.
[dev]
port = 8787

# ── DEFAULT ENV (local dev) ─────────────────────────────────────────────────
# `wrangler dev` (and `npm run dev`) reads everything from the top level.
# Vars here are dev-friendly; the prod overrides live in [env.production.*]
# blocks at the bottom. Bindings (D1/R2/DO/Workflow/Assets) are NOT inherited
# by env blocks in wrangler v4 — they're duplicated per env. Dev and prod are
# isolated for stateful resources: D1 (bible_editor_dev vs bible_editor), R2
# (bible-editor-blobs-dev vs bible-editor-blobs), and the Workflow name
# (bible-editor-export-dev vs bible-editor-export). So a plain `wrangler deploy`
# can never read/write prod state. DO + Assets remain identical (no shared
# durable state to clobber).

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Document navigations to /api/* (Sec-Fetch-Dest: document) would otherwise be
# swallowed by the SPA fallback and never hit the Worker — which breaks the
# OAuth start redirect (Sign in with Door43 → 200 index.html instead of 302
# to git.door43.org). Force the Worker to run first for /api/* paths.
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "bible_editor_dev"
database_id = "ceb458bf-4608-4696-a087-9026618a6cef"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "bible-editor-blobs-dev"

[[durable_objects.bindings]]
name = "CHAPTER_ROOM"
class_name = "ChapterRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChapterRoom"]

[[workflows]]
# Dev-suffixed: Workflow names are account-scoped and owned by one script, so
# sharing prod's name ("bible-editor-export") would let a plain dev deploy
# collide with prod's workflow. Binding stays EXPORT_WORKFLOW so code is
# unaffected.
name = "bible-editor-export-dev"
binding = "EXPORT_WORKFLOW"
class_name = "ExportWorkflow"

# No [triggers] on the default env: crons are registered only on production
# (below) so an accidental dev deploy can't double-fire the nightly export.
# `wrangler dev --test-scheduled` exposes /__scheduled regardless.

# Public-safe defaults; secrets go in `wrangler secret put` (DCS_CLIENT_ID,
# DCS_CLIENT_SECRET, JWT_SIGNING_KEY, DCS_SERVICE_TOKEN, BT_API_TOKEN).
# ALLOWED_ORIGINS empty → falls back to the dev allowlist inside src/index.ts
# (localhost:5173 / 8787 only).
# DEV_AUTH_ENABLED gates the /api/auth/dev mint endpoint; flipped to "false"
# in the prod env block below.
# DCS_EXPORT_OWNER controls which owner nightly exports land on (the branch is
# derived per-book from contributors, not configured).
# BT_API_TOKEN (secret) authorizes /api/tn-quick + /api/pipelines/*.
# TN_QUICK_URL / PIPELINE_API_BASE override the bot endpoints.
[vars]
DCS_BASE_URL = "https://git.door43.org"
DCS_OAUTH_AUTHORIZE_URL = "https://git.door43.org/login/oauth/authorize"
DCS_OAUTH_TOKEN_URL = "https://git.door43.org/login/oauth/access_token"
JWT_ISSUER = "bible-editor"
JWT_TTL_SECONDS = "1209600"
ALLOWED_ORIGINS = ""
DEV_AUTH_ENABLED = "true"
DCS_EXPORT_OWNER = "unfoldingWord"
TN_QUICK_URL = "https://uw-bt-bot.fly.dev/api/tn-quick"
PIPELINE_API_BASE = "https://uw-bt-bot.fly.dev"

# ── PRODUCTION ENV ──────────────────────────────────────────────────────────
# Activated by `wrangler deploy --env production` (which is what `npm run
# deploy` runs). `name` is repeated so the deploy lands on the existing
# `bible-editor-api` worker instead of a name-suffixed
# `bible-editor-api-production`. Secrets are scoped to the Worker, so they
# carry over without re-uploading.

[env.production]
name = "bible-editor-api"

[env.production.assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "bible_editor"
database_id = "7e566abf-454d-43d6-b24e-11df74f1c0ed"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "BLOBS"
bucket_name = "bible-editor-blobs"

[[env.production.durable_objects.bindings]]
name = "CHAPTER_ROOM"
class_name = "ChapterRoom"

[[env.production.migrations]]
tag = "v1"
new_classes = ["ChapterRoom"]

[[env.production.workflows]]
name = "bible-editor-export"
binding = "EXPORT_WORKFLOW"
class_name = "ExportWorkflow"

[env.production.triggers]
# Export cron retimed to 05:30 UTC (was "0 6 * * *") so the -be- branches land
# ~30 min before Rich's 06:00 UTC DCS-side validate-and-merge job (sequence:
# export -> per-push validation -> 06:00 merge). The */5 pipeline-poll cron is
# unrelated (AI auto-apply).
# Future: nightly DCS re-import is wired up in src/index.ts (REIMPORT_CRON
# branch) but deliberately not registered yet. Add "0 8 * * *" once the
# export → DCS git-action merge loop is verified end-to-end.
crons = ["30 5 * * *", "*/5 * * * *"]

[env.production.vars]
DCS_BASE_URL = "https://git.door43.org"
DCS_OAUTH_AUTHORIZE_URL = "https://git.door43.org/login/oauth/authorize"
DCS_OAUTH_TOKEN_URL = "https://git.door43.org/login/oauth/access_token"
JWT_ISSUER = "bible-editor"
JWT_TTL_SECONDS = "1209600"
ALLOWED_ORIGINS = "https://bible-editor-api.unfoldingword.workers.dev"
DEV_AUTH_ENABLED = "false"
DCS_EXPORT_OWNER = "unfoldingWord"
TN_QUICK_URL = "https://uw-bt-bot.fly.dev/api/tn-quick"
PIPELINE_API_BASE = "https://uw-bt-bot.fly.dev"
